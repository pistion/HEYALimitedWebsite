services:
  - type: web
    name: heya-limited-website
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: heya-submissions-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: SQLITE_DB_PATH
        value: /var/data/website_data.sqlite
      - key: SESSION_SECRET
        generateValue: true
      - key: SUBMISSIONS_TOKEN
        sync: false
